name: Deploy Admin Portal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:production

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi

      - name: Create deployment archive
        run: tar -czf admin-deploy.tar.gz -C .next/standalone .

      - name: Stop admin PM2 process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.86.53.214
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            pm2 stop Admin 2>$null; $true
            Remove-Item -Recurse -Force "C:\inetpub\wwwroot\DPEG-frontend\Admin\*" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force "C:\inetpub\wwwroot\DPEG-frontend\Admin" | Out-Null

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.86.53.214
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: admin-deploy.tar.gz
          target: C:\Temp\

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.86.53.214
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd C:\Temp
            tar -xzf admin-deploy.tar.gz -C "C:\inetpub\wwwroot\DPEG-frontend\Admin"
            Remove-Item admin-deploy.tar.gz -ErrorAction SilentlyContinue
            cd "C:\inetpub\wwwroot\DPEG-frontend\Admin"
            pm2 restart Admin 2>$null; if (-not $?) { pm2 start server.js --name Admin }
            pm2 save
